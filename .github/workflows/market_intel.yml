name: market_intel

on:
  push:
    paths:
      - "scripts/**"
      - "config/**"
      - "regime_trader/**"
      - "monitoring/**"
      - "tests/**"
      - ".github/workflows/market_intel.yml"
  pull_request:
    paths:
      - "scripts/**"
      - "config/**"
      - "regime_trader/**"
      - "monitoring/**"
      - "tests/**"
  # Scheduled fetch removed — edgar_3x.yml runs 3×/day and covers data production.
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install CI deps (lightweight)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Run full test suite
        env:
          CI: "true"
        run: pytest tests/ -v -m "not slow"
