name: nightly_edgar

# ─────────────────────────────────────────────────────────────────────────────
# Manual full-universe EDGAR backfill (160 tickers).
# Schedule disabled — edgar_3x.yml covers the 00:00 UTC run.
# Use workflow_dispatch for deep historical backfills or recovery runs.
#
# FMP Ultimate changes:
#   - FMP_MAX_RPS corrected to 50 (was 30 — stale from Premium tier)
#   - Bulk pre-fetch step added before the ticker loop
#   - max-workers raised to 8 (EDGAR is the bottleneck, not FMP)
#   - timeout-minutes reduced from 45 to 25
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      tickers_file:
        description: "Tickers CSV (path relative to repo root)"
        required: false
        default: "config/universe.csv"
      min_coverage:
        description: "Min EDGAR coverage ratio (0–1)"
        required: false
        default: "0.80"
      skip_bulk_cache:
        description: "Force fresh bulk download (bypass cache)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  nightly-edgar:
    runs-on: ubuntu-latest
    timeout-minutes: 25 # was 45 — bulk migration + higher parallelism

    concurrency:
      group: nightly_edgar
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Get cache date
        id: cache_date
        run: echo "date=$(date -u '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore pipeline data cache
        uses: actions/cache@v4
        with:
          path: .cache/
          key: pipeline-cache-${{ runner.os }}-${{ steps.cache_date.outputs.date }}
          restore-keys: |
            pipeline-cache-${{ runner.os }}-

      - name: Install CI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Install full pipeline deps
        run: pip install -r requirements.txt

      # ── FMP bulk pre-fetch ────────────────────────────────────────────────────
      # TTL=0 with skip_bulk_cache=true forces fresh download on recovery runs.
      - name: FMP bulk pre-fetch (Ultimate)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FMP_MAX_RPS: ${{ vars.FMP_MAX_RPS || '50' }}
          BULK_CACHE_DIR: ".cache/bulk_snapshots"
        run: |
          TTL="23"
          if [ "${{ github.event.inputs.skip_bulk_cache }}" = "true" ]; then
            TTL="0"
            echo "Bulk cache bypass requested — forcing fresh download"
          fi
          python scripts/fmp_bulk_prefetch.py \
            --cache-dir  "$BULK_CACHE_DIR" \
            --ttl-hours  "$TTL" \
            --endpoints  financial-scores-bulk \
                         upgrades-downgrades-consensus-bulk \
                         earnings-surprises-bulk \
                         price-target-summary-bulk \
                         ratios-ttm-bulk \
                         key-metrics-ttm-bulk \
                         eod-bulk \
            --verbose

      # ── EDGAR full-universe fetch ─────────────────────────────────────────────
      - name: EDGAR full-universe fetch
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          # FMP Ultimate: 3,000 req/min = 50 req/s. Was 30 (Premium-era setting).
          FMP_MAX_RPS: ${{ vars.FMP_MAX_RPS || '50' }}
          EDGAR_FIRST: "true"
          BULK_CACHE_DIR: ".cache/bulk_snapshots"
        run: |
          TICKERS_FILE="${{ github.event.inputs.tickers_file || 'config/universe.csv' }}"
          LOG_DIR="logs"
          mkdir -p "$LOG_DIR" .monitoring

          SUCCESS=false
          for ATTEMPT in 1 2 3; do
            echo "::group::EDGAR fetch — attempt $ATTEMPT / 3"
            START=$(date +%s)

            if python scripts/run_pipeline.py \
              --tickers-file "$TICKERS_FILE" \
              --max-workers  8 \
              --log-dir      "$LOG_DIR" \
              --bulk-cache   "$BULK_CACHE_DIR" \
              --verbose; then
              END=$(date +%s)
              echo "DURATION_SECONDS=$((END - START))" >> "$GITHUB_ENV"
              SUCCESS=true
              echo "::endgroup::"
              break
            fi

            echo "::endgroup::"
            if [ "$ATTEMPT" -lt 3 ]; then
              WAIT=$((ATTEMPT * 30))
              echo "::warning::Attempt $ATTEMPT failed — retrying in ${WAIT}s"
              sleep "$WAIT"
            fi
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "::error::All 3 EDGAR fetch attempts failed"
            exit 1
          fi

      - name: Export metrics
        if: always()
        run: |
          python -m monitoring.metrics_exporter \
            --log-dir logs \
            --duration-seconds "${DURATION_SECONDS:-0}"

      - name: Show metrics
        if: always()
        run: |
          if [ -f logs/metrics.json ]; then
            echo "=== metrics.json ==="
            cat logs/metrics.json
          else
            echo "metrics.json not found"
          fi

      - name: Check coverage thresholds
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL || '' }}
        run: |
          python -m monitoring.check_metrics \
            --log-dir      logs \
            --min-coverage "${{ github.event.inputs.min_coverage || '0.80' }}" \
            --max-errors   5

      - name: Check Minsky insider stress
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL || '' }}
        run: |
          python -m monitoring.minsky_alert --log-dir logs

      - name: Write job summary
        if: always()
        run: |
          echo "## EDGAR Nightly — $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tickers file | \`${{ github.event.inputs.tickers_file || 'config/universe.csv' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Min coverage | \`${{ github.event.inputs.min_coverage || '0.80' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bulk cache bypass | \`${{ github.event.inputs.skip_bulk_cache || 'false' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f logs/metrics.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat logs/metrics.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No metrics.json — pipeline failed before producing outputs._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-edgar-${{ github.run_id }}
          retention-days: 90
          if-no-files-found: warn
          path: |
            logs/form4_summary.csv
            logs/edgar_debug_summary.json
            logs/marketintel_events.json
            logs/intel_source_status.json
            logs/metrics.json
            logs/*.log
            .monitoring/edgar_cb.json
            .monitoring/alert_state.json
