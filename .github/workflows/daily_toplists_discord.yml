name: daily_toplists_discord

# ─────────────────────────────────────────────────────────────────────────────
# Daily market checkup delivered to Discord.
#
# Schedule: 13:00 UTC = 14:00 BST (UK summer) / 13:00 GMT (UK winter).
#
# workflow_run trigger: chains off pipeline_us (the slower bottleneck pipeline).
# Because pipeline_intl has no EDGAR overhead, its intl-top-lists artifact is
# always published before pipeline_us completes — no race condition.
#
# Artifact staging:
#   us-top-lists   (from pipeline_us.yml)   → downloaded to logs/us/
#   intl-top-lists (from pipeline_intl.yml) → downloaded to logs/intl/
#   Both are then flattened into logs/ so send_toplists_discord.py can read
#   intel_source_status.json and top_lists_intl.json at the paths it expects.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC = 14:00 BST / 13:00 GMT (fallback daily delivery)
  workflow_run:
    workflows: ["pipeline_us"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print Discord payload without sending"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      source_run_id:
        description: "Caller identifier (e.g. gcf-20260507T1400)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: daily_toplists_discord
  cancel-in-progress: false

jobs:
  send-discord:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # For workflow_run trigger: only send when pipeline_us succeeded.
    # For schedule and workflow_dispatch triggers the condition is always true.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      # ── 1. Checkout (needed for scripts/) ────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python 3.11 ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install send deps (requests only — lightweight) ───────────────────
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests>=2.31.0

      # ── 4. Verify London local timing ────────────────────────────────────────
      - name: Verify London Local Timing Gate
        run: |
          python3 -c "
          from datetime import datetime
          import zoneinfo
          london_time = datetime.now(zoneinfo.ZoneInfo('Europe/London'))
          print(f'Current London Time: {london_time.strftime(\"%H:%M %Z\")}')
          print(f'UTC offset: {london_time.strftime(\"%z\")}')
          "

      # ── 5. Create workspace directories ──────────────────────────────────────
      - name: Create workspace directories
        run: mkdir -p logs/us logs/intl logs

      # ── 6. Download US top-lists (from pipeline_us.yml) ──────────────────────
      #
      # dawidd6/action-download-artifact@v8 supports the v4 artifact API.
      # "if_no_artifact_found: warn" prevents step failure — the send step
      # detects the missing file and sends an alert embed instead.
      - name: Download US top-lists
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: pipeline_us.yml
          name: us-top-lists
          path: logs/us/
          search_artifacts: true
          workflow_conclusion: success
          if_no_artifact_found: warn

      # ── 7. Download International top-lists (from pipeline_intl.yml) ─────────
      # pipeline_intl always completes before pipeline_us due to the absence
      # of EDGAR parsing overhead, so this artifact is always fresh.
      - name: Download International top-lists
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: pipeline_intl.yml
          name: intl-top-lists
          path: logs/intl/
          search_artifacts: true
          workflow_conclusion: success
          if_no_artifact_found: warn

      # ── 8. Stage artifacts for dispatch script ───────────────────────────────
      # Flattens logs/us/* and logs/intl/* into logs/ so send_toplists_discord.py
      # finds intel_source_status.json and top_lists_intl.json at their expected
      # paths without requiring changes to the core dispatch logic.
      - name: Stage artifacts for dispatch script
        run: |
          if [ -d logs/us ] && [ "$(ls -A logs/us 2>/dev/null)" ]; then
            cp -r logs/us/. logs/
          fi
          if [ -d logs/intl ] && [ "$(ls -A logs/intl 2>/dev/null)" ]; then
            cp -r logs/intl/. logs/
          fi
          echo "=== logs/ contents after staging ==="
          ls -la logs/

      # ── 9. Freshness gate — trigger-aware threshold ───────────────────────────
      #
      # workflow_run (chained from pipeline_us): artifact should be <6h old.
      # schedule (13:00 UTC fallback):          allows up to 25h for a missed run.
      - name: Verify intel_source_status.json freshness
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - <<'EOF'
          import json, sys, os
          from datetime import datetime, timezone
          from pathlib import Path

          p = Path("logs/intel_source_status.json")
          if not p.exists():
              print("intel_source_status.json not found — send step will handle alert embed")
              sys.exit(0)

          try:
              d = json.loads(p.read_text(encoding="utf-8"))
              generated_at = (
                  d.get("generated_at") or d.get("computed_at") or
                  (d.get("_edgar_meta") or {}).get("last_run") or ""
              )
              if not generated_at:
                  print("::error::intel_source_status.json has no timestamp — refusing stale data")
                  sys.exit(1)

              ts = datetime.fromisoformat(generated_at.replace("Z", "+00:00"))
              age_h = (datetime.now(timezone.utc) - ts).total_seconds() / 3600

              event_name = os.environ.get("GITHUB_EVENT_NAME", "unknown")
              max_age_h = 6.0 if event_name == "workflow_run" else 25.0

              print(f"Trigger: {event_name} | Artifact age: {age_h:.1f}h | Threshold: {max_age_h}h")

              if age_h > max_age_h:
                  print(
                      f"::error::Artifact is {age_h:.1f}h old (threshold: {max_age_h}h "
                      f"for {event_name}). Refusing stale Discord send."
                  )
                  sys.exit(1)

              print(f"Freshness OK: {age_h:.1f}h < {max_age_h}h")

          except SystemExit:
              raise
          except Exception as e:
              print(f"::warning::Freshness check failed ({e}) — proceeding anyway")
          EOF

      # ── 10. Send to Discord (3 retries, 30s/60s backoff) ─────────────────────
      - name: Send daily market checkup
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL || '' }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python scripts/send_toplists_discord.py \
            --input   logs/intel_source_status.json \
            --log-dir logs \
            $DRY_RUN_FLAG

      # ── 11. Upload send log on failure ───────────────────────────────────────
      - name: Upload Discord send log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discord-send-log-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: ignore
          path: logs/discord_send.log
