name: daily_toplists_discord

# ─────────────────────────────────────────────────────────────────────────────
# Daily market checkup delivered to Discord.
#
# Schedule: 13:00 UTC = 14:00 BST (UK summer) / 13:00 GMT (UK winter).
# Fires ~4 h after edgar_3x's 08:00 UTC run, guaranteeing fresh morning data.
#
# workflow_run trigger: also fires automatically whenever edgar_3x completes
# (scheduled or manual dispatch), so a manual edgar_3x run chains through.
# The job-level condition filters to successful edgar_3x runs only.
#
# Artifact download: uses dawidd6/action-download-artifact@v8 to fetch the
# "top-lists" artifact from the most recent successful edgar_3x run.
# @v8 supports the artifact API used by actions/upload-artifact@v4 in edgar_3x.yml.
# If no artifact is found (edgar_3x never ran), sends an alert embed instead.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC = 14:00 BST / 13:00 GMT
  workflow_run:
    workflows: ["edgar_3x"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print Discord payload without sending"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      source_run_id:
        description: "Caller identifier (e.g. gcf-20260507T1400)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read

jobs:
  send-discord:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # For workflow_run trigger: only send when edgar_3x succeeded.
    # For schedule and workflow_dispatch triggers the condition is always true.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      # ── 1. Checkout (needed for scripts/) ─────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python 3.11 ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install send deps (requests only — lightweight) ───────────────────
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests>=2.31.0

      # ── 4. Verify London local timing ────────────────────────────────────────
      #
      # Diagnostic only — prints current London time so run logs show whether
      # the GCF scheduler fired at the correct local hour (14:00 BST / 13:00 GMT).
      # No exit-code gate here; the GCF scheduler is the authoritative clock.
      - name: Verify London Local Timing Gate
        run: |
          python3 -c "
          from datetime import datetime
          import zoneinfo
          london_time = datetime.now(zoneinfo.ZoneInfo('Europe/London'))
          print(f'Current London Time: {london_time.strftime(\"%H:%M %Z\")}')
          print(f'UTC offset: {london_time.strftime(\"%z\")}')
          "

      # ── 5. Download latest top-lists artifact from edgar_3x ─────────────────
      #
      # dawidd6/action-download-artifact@v8 supports the v4 artifact API used
      # by actions/upload-artifact@v4 in edgar_3x.yml. Prior v3 was incompatible.
      # "if_no_artifact_found: warn" prevents the step from failing — instead,
      # the send step detects the missing file and sends an alert.
      - name: Download top-lists artifact
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: edgar_3x.yml
          name: top-lists
          path: logs/
          if_no_artifact_found: warn
          # Allow artifacts up to 2 days old (3 runs/day → always fresh)
          workflow_conclusion: success

      # ── 5b. Freshness gate — refuse stale data before Discord fires ────────────
      #
      # top_lists.json is downloaded from the most recent edgar_3x artifact.
      # If the artifact is older than 25h (missed run + buffer), fail loud
      # rather than repeating yesterday's rankings.
      # Uses generated_at field (ISO timestamp) — robust regardless of artifact mtime.
      - name: Verify intel_source_status.json freshness
        run: |
          python3 - <<'EOF'
          import json, sys
          from datetime import datetime, timezone
          from pathlib import Path
          p = Path("logs/intel_source_status.json")
          if not p.exists():
              print("intel_source_status.json not found — send step will handle alert embed")
              sys.exit(0)
          try:
              d = json.loads(p.read_text(encoding="utf-8"))
              # intel_source_status.json uses 'computed_at'; top_lists.json uses 'generated_at'
              generated_at = (d.get("generated_at")
                              or d.get("computed_at")
                              or (d.get("_edgar_meta") or {}).get("last_run")
                              or "")
              if not generated_at:
                  print("::error::intel_source_status.json has no timestamp field — refusing to send stale data")
                  sys.exit(1)
              ts = datetime.fromisoformat(generated_at.replace("Z", "+00:00"))
              age_h = (datetime.now(timezone.utc) - ts).total_seconds() / 3600
              print(f"intel_source_status.json age: {age_h:.1f}h (timestamp: {generated_at})")
              if age_h > 25:
                  print(f"::error::intel_source_status.json is {age_h:.1f}h old (> 25h threshold) — "
                        f"edgar_3x may have failed. Refusing to send stale Discord message.")
                  sys.exit(1)
              print(f"Freshness OK: {age_h:.1f}h < 25h")
          except SystemExit:
              raise
          except Exception as e:
              print(f"::warning::Freshness check failed ({e}) — proceeding anyway")
          EOF

      # ── 6. Send to Discord (3 retries, 30s/60s backoff) ──────────────────────
      - name: Send daily market checkup
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL || '' }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python scripts/send_toplists_discord.py \
            --input   logs/intel_source_status.json \
            --log-dir logs \
            $DRY_RUN_FLAG

      # ── 7. Upload send log on failure (always, for debugging) ────────────────
      - name: Upload Discord send log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discord-send-log-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: ignore
          path: logs/discord_send.log
