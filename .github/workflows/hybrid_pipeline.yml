name: hybrid_pipeline

# ─────────────────────────────────────────────────────────────────────────────
# Hybrid Quant + Claude pipeline
#
# Flow:
#   1. [quant]              Load edgar_3x top-lists; validate freshness
#   2. [reshape]            Reshape to 9-factor shortlist schema
#   3. [regime]             Detect regime (VIX thresholds aligned with kill-switch)
#   4. [preflight_cost]     Token cost estimate — accounts for transcript size
#   5. [claude]             Claude analysis on shortlist with full factor context
#   6. [gate]               Schema validation + auto-execute gate
#   7. [audit]              Upload full audit bundle
#
# Triggers:
#   - schedule: 08:30 ET on trading days (12:30 UTC)
#   - workflow_dispatch with optional overrides
#
# VIX regime thresholds (aligned with _apply_vix_overlay kill-switch):
#   VIX < 20  → Normal
#   VIX 20-29 → Bear (graduated caution — reduce shortlist floor to 85)
#   VIX ≥ 30  → Panic/Crash (kill-switch: BUY signals suppressed)
#
# Cost model (transcript-aware, claude-sonnet-4-6):
#   Input:  (8000 transcript + 600 quant context) tokens × $3/Mtoken
#   Output: 450 tokens × $15/Mtoken
#   Per symbol: ~$0.031.  At 20 shortlist: $0.62.  Cap: $2.00 → max 64 symbols.
#
# Secrets required:
#   ANTHROPIC_API_KEY, FMP_API_KEY
#   DISCORD_WEBHOOK_URL (optional)
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "30 12 * * 1-5" # 12:30 UTC = 08:30 ET, weekdays
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Bypass discovery cache"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      shortlist_floor:
        description: "Min quant score for shortlist (0–100)"
        required: false
        default: "80"
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: hybrid_pipeline
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  SHORTLIST_QUINTILE_FLOOR: ${{ github.event.inputs.shortlist_floor || '80' }}

jobs:
  # ── 1. Load & reshape quant data ────────────────────────────────────────────
  quant:
    name: Load edgar_3x top lists
    runs-on: ubuntu-latest
    outputs:
      shortlist_artifact: ${{ steps.export.outputs.artifact_name }}
      regime: ${{ steps.regime.outputs.regime }}
      vix: ${{ steps.regime.outputs.vix }}
      kill_switch: ${{ steps.regime.outputs.kill_switch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal deps
        run: python -m pip install --upgrade pip

      - name: Download edgar_3x top-lists artifact
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: edgar_3x.yml
          name: top-lists
          path: logs/
          workflow_conclusion: success
          if_no_artifact_found: warn

      # Note: edgar_3x artifact now contains top_lists_us.json (not top_lists.json)
      # See hybrid_pipeline reshape step for path handling.

      - name: Validate edgar_3x artifact freshness
        run: |
          python3 - <<'PYEOF'
          import json, sys
          from datetime import datetime, timezone
          from pathlib import Path

          candidates = [
              Path("logs/intel_source_status.json"),
              Path("logs/top_lists.json"),
          ]
          data = None
          for p in candidates:
              if p.exists():
                  try:
                      data = json.loads(p.read_text(encoding="utf-8"))
                      print(f"Loaded freshness check from: {p.name}")
                      break
                  except Exception as e:
                      print(f"::warning::Could not parse {p.name}: {e}")

          if data is None:
              print("::warning::No edgar_3x artifact found — shortlist will be empty.")
              sys.exit(0)

          ts_str = (
              data.get("computed_at")
              or data.get("generated_at")
              or (data.get("_edgar_meta") or {}).get("last_run")
              or ""
          )

          if not ts_str:
              print("::warning::Artifact has no timestamp — cannot verify freshness. Proceeding.")
              sys.exit(0)

          try:
              ts = datetime.fromisoformat(ts_str.replace("Z", "+00:00"))
              age_h = (datetime.now(timezone.utc) - ts).total_seconds() / 3600
          except Exception as e:
              print(f"::warning::Cannot parse timestamp '{ts_str}': {e}. Proceeding.")
              sys.exit(0)

          print(f"Artifact age: {age_h:.1f}h (timestamp: {ts_str[:19]})")
          MAX_AGE_HOURS = 12
          if age_h > MAX_AGE_HOURS:
              print(
                  f"::error::Artifact is {age_h:.1f}h old (threshold: {MAX_AGE_HOURS}h). "
                  f"edgar_3x has likely failed. Refusing stale data."
              )
              sys.exit(1)
          print(f"Freshness OK: {age_h:.1f}h < {MAX_AGE_HOURS}h threshold.")
          PYEOF

      # Reshape to 9-factor schema — includes analyst_consensus and quality_piotroski
      # Note: edgar_3x artifact now contains top_lists_us.json (not top_lists.json)
      - name: Reshape top_lists_us → shortlist.json (9-factor schema)
        run: |
          python - <<'PYEOF'
          import json, os, pathlib

          src = pathlib.Path("logs/top_lists_us.json")
          if not src.exists():
              print("top_lists_us.json not found — writing empty shortlist")
              payload = {"shortlist": [], "candidates": []}
          else:
              data = json.loads(src.read_text())
              top_buys = data.get("top_buys", [])
              shortlist = [e["ticker"] for e in top_buys]
              candidates = [
                  {
                      "symbol":              e["ticker"],
                      "smart_money_score":   e.get("final_score", 0.0),
                      # 9-factor schema
                      "insider_conviction":  e.get("factors", {}).get("insider_conviction", 0.0),
                      "insider_breadth":     e.get("factors", {}).get("insider_breadth", 0.0),
                      "congress":            e.get("factors", {}).get("congress", 0.0),
                      "news_sentiment":      e.get("factors", {}).get("news_sentiment", 0.0),
                      "news_buzz":           e.get("factors", {}).get("news_buzz", 0.0),
                      "momentum_long":       e.get("factors", {}).get("momentum_long", 0.0),
                      "volume_attention":    e.get("factors", {}).get("volume_attention", 0.0),
                      "analyst_consensus":   e.get("factors", {}).get("analyst_consensus", 0.0),
                      "quality_piotroski":   e.get("factors", {}).get("quality_piotroski", 0.0),
                      # Metadata for Claude context
                      "badge":               e.get("badge", ""),
                      "market_cap_tier":     e.get("market_cap_tier", ""),
                      "piotroski_raw":       e.get("piotroski_raw", None),
                  }
                  for e in top_buys
              ]
              payload = {
                  "shortlist": shortlist,
                  "candidates": candidates,
                  "weights": data.get("weights", {}),
                  "vix": data.get("vix", 0.0),
                  "kill_switch": data.get("kill_switch", False),
              }

          out = pathlib.Path("data/pipeline/shortlist.json")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(payload, indent=2))
          print(f"Wrote shortlist: {len(payload['shortlist'])} tickers (9-factor schema)")
          PYEOF

      # VIX regime thresholds now aligned with kill-switch logic:
      #   <20 = Normal, 20-29 = Bear (graduated), ≥30 = Panic/Crash (kill-switch)
      - name: Detect regime
        id: regime
        run: |
          python - <<'PYEOF'
          import json, pathlib, os

          src = pathlib.Path("logs/top_lists_us.json")
          if not src.exists():
              regime = "Normal"
              vix_val = 0.0
              kill_switch = False
          else:
              data = json.loads(src.read_text())
              kill_switch = bool(data.get("kill_switch", False))
              try:
                  vix_val = float(data.get("vix") or 0)
              except (TypeError, ValueError):
                  vix_val = 0.0

              if kill_switch or vix_val >= 30:
                  regime = "Panic/Crash"   # kill-switch active — BUYs suppressed
              elif vix_val >= 20:
                  regime = "Bear"          # graduated caution
              else:
                  regime = "Normal"

          out = os.environ.get("GITHUB_OUTPUT", "")
          if out:
              with open(out, "a") as f:
                  f.write(f"regime={regime}\n")
                  f.write(f"vix={vix_val:.1f}\n")
                  f.write(f"kill_switch={str(kill_switch).lower()}\n")
          print(f"Regime: {regime} | VIX: {vix_val:.1f} | Kill-switch: {kill_switch}")
          PYEOF

      - name: Export artifact name
        id: export
        run: echo "artifact_name=quant-shortlist-${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Upload shortlist artifact
        uses: actions/upload-artifact@v4
        with:
          name: quant-shortlist-${{ github.run_id }}
          path: data/pipeline/
          retention-days: 7

  # ── 3. Kill-switch bypass summary ────────────────────────────────────────────
  kill_switch_notice:
    name: Kill-Switch Active Notice
    needs: quant
    runs-on: ubuntu-latest
    if: needs.quant.outputs.kill_switch == 'true'
    steps:
      - name: Log kill-switch state
        run: |
          echo "## ⚠️ VIX Kill-Switch Active" >> $GITHUB_STEP_SUMMARY
          echo "VIX=${{ needs.quant.outputs.vix }} ≥ 30 — BUY signals suppressed." >> $GITHUB_STEP_SUMMARY
          echo "Claude analysis skipped. SELL signals remain live." >> $GITHUB_STEP_SUMMARY
          echo "Kill-switch state logged for audit trail: $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY

  # ── 5. Gate & human review summary ──────────────────────────────────────────
  gate:
    name: Gate & Audit Summary
    needs: [quant]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Print audit summary
        run: |
          echo "## Hybrid Pipeline Run ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Regime | ${{ needs.quant.outputs.regime }} |" >> $GITHUB_STEP_SUMMARY
          echo "| VIX | ${{ needs.quant.outputs.vix }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Kill-switch | ${{ needs.quant.outputs.kill_switch }} |" >> $GITHUB_STEP_SUMMARY
