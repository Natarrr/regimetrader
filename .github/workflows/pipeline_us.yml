name: pipeline_us

# ─────────────────────────────────────────────────────────────────────────────
# US Market Pipeline — 9-factor EDGAR + FMP scoring.
#
# Runs 3× daily Mon-Fri, concurrently with pipeline_intl.yml.
# Publishes the "us-top-lists" artifact consumed by daily_toplists_discord.yml.
#
# Factor breakdown (us_strategy.json):
#   insider_conviction / insider_breadth — SEC EDGAR Form 4 + FMP insiders
#   congress                             — S3 Stock Watcher + FMP fallback
#   news_sentiment / news_buzz           — FMP stable/news + PEAD boost
#   momentum_long / volume_attention     — FMP historical-price-eod/full
#   analyst_consensus                    — FMP upgrades-downgrades-consensus-bulk
#   quality_piotroski                    — FMP ratios-ttm (per-ticker)
#
# Artifact ordering:
#   edgar_3x → hybrid_pipeline (legacy)
#   pipeline_us ──┐
#                  ├─→ daily_toplists_discord
#   pipeline_intl ─┘
# ─────────────────────────────────────────────────────────────────────────────

on:
    schedule:
        - cron: "0 0 * * 1-5" # 00:00 UTC — post-Asia close
        - cron: "0 8 * * 1-5" # 08:00 UTC — London open
        - cron: "0 16 * * 1-5" # 16:00 UTC — NYC mid-session
    workflow_dispatch:
        inputs:
            tickers_file:
                description: "Tickers CSV (relative to repo root)"
                required: false
                default: "config/universe.csv"
            force_regen:
                description: "Force top_lists regeneration even if fresh"
                required: false
                default: "false"
                type: choice
                options: ["true", "false"]

permissions:
    contents: read

jobs:
    fetch-and-rank-us:
        name: US — EDGAR + FMP 9-Factor Scoring
        runs-on: ubuntu-latest
        timeout-minutes: 25

        concurrency:
            group: us_pipeline
            cancel-in-progress: false

        steps:
            # ── 1. Checkout ──────────────────────────────────────────────────────────
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            # ── 2. Python 3.11 + pip cache ───────────────────────────────────────────
            - name: Set up Python 3.11
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"

            # ── 3. Restore daily pipeline cache ─────────────────────────────────────
            # Persists bulk snapshots (150 MB, stable within a trading day) and
            # congress_cache.json (24h TTL) across the three intraday runs.
            # Key is scoped to "us-pipeline" to avoid write conflicts with edgar_3x.
            - name: Get cache date
              id: cache_date
              run: echo "date=$(date -u '+%Y-%m-%d')" >> $GITHUB_OUTPUT

            - name: Restore pipeline data cache
              uses: actions/cache@v4
              with:
                  path: .cache/
                  key: us-pipeline-cache-${{ runner.os }}-${{ steps.cache_date.outputs.date }}
                  restore-keys: |
                      us-pipeline-cache-${{ runner.os }}-
                      pipeline-cache-${{ runner.os }}-

            # ── 4. Install dependencies ──────────────────────────────────────────────
            - name: Install CI deps
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements-ci.txt

            - name: Install full pipeline deps
              run: pip install -r requirements.txt

            # ── 5. Bulk FMP pre-fetch (Ultimate tier: 50 req/s) ─────────────────────
            - name: FMP bulk pre-fetch (Ultimate)
              env:
                  FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
                  FMP_MAX_RPS: ${{ vars.FMP_MAX_RPS || '50' }}
                  BULK_CACHE_DIR: ".cache/bulk_snapshots"
                  BULK_CACHE_TTL_HOURS: "7"
              run: |
                  set -euo pipefail
                  python scripts/fmp_bulk_prefetch.py \
                    --cache-dir  "$BULK_CACHE_DIR" \
                    --ttl-hours  "$BULK_CACHE_TTL_HOURS" \
                    --endpoints  upgrades-downgrades-consensus-bulk \
                                 ratios-ttm-bulk \
                                 key-metrics-ttm-bulk \
                    --verbose

            # ── 6. EDGAR fetch — 3-attempt retry ────────────────────────────────────
            # SEC rate limit: 10 req/s (enforced via shared lock in run_pipeline.py).
            # FMP_MAX_RPS=50 saturates Ultimate without exceeding the SEC limit.
            - name: EDGAR full-universe fetch
              id: edgar_fetch
              env:
                  EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
                  FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
                  FMP_MAX_RPS: ${{ vars.FMP_MAX_RPS || '50' }}
                  EDGAR_FIRST: "true"
                  BULK_CACHE_DIR: ".cache/bulk_snapshots"
              run: |
                  TICKERS_FILE="${{ github.event.inputs.tickers_file || 'config/universe.csv' }}"
                  LOG_DIR="logs"
                  mkdir -p "$LOG_DIR" .monitoring

                  SUCCESS=false
                  for ATTEMPT in 1 2 3; do
                    echo "::group::EDGAR fetch — attempt $ATTEMPT / 3"
                    START=$(date +%s)
                    if timeout 20m python scripts/run_pipeline.py \
                      --tickers-file "$TICKERS_FILE" \
                      --max-workers  8 \
                      --log-dir      "$LOG_DIR" \
                      --bulk-cache   ".cache/bulk_snapshots" \
                      --verbose; then
                      END=$(date +%s)
                      echo "DURATION_SECONDS=$((END - START))" >> "$GITHUB_ENV"
                      SUCCESS=true
                      echo "::endgroup::"
                      break
                    fi
                    echo "::endgroup::"
                    if [ "$ATTEMPT" -lt 3 ]; then
                      WAIT=$((ATTEMPT * 30))
                      echo "::warning::Attempt $ATTEMPT failed — retrying in ${WAIT}s"
                      sleep "$WAIT"
                    fi
                  done

                  if [ "$SUCCESS" != "true" ]; then
                    echo "::error::All 3 EDGAR fetch attempts failed"
                    exit 1
                  fi

            # ── 7. Export metrics ────────────────────────────────────────────────────
            - name: Export metrics
              if: always()
              run: |
                  python -m monitoring.metrics_exporter \
                    --log-dir logs \
                    --duration-seconds "${DURATION_SECONDS:-0}"

            # ── 8. Generate top_lists.json ───────────────────────────────────────────
            - name: Generate top lists
              env:
                  FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
                  GITHUB_RUN_ID: ${{ github.run_id }}
                  BULK_CACHE_DIR: ".cache/bulk_snapshots"
              run: |
                  FORCE=""
                  if [ "${{ github.event.inputs.force_regen }}" = "true" ]; then
                    FORCE="--force"
                  fi
                  python -m backend.market_intel.generate_top_lists \
                    --log-dir    logs \
                    --run-id     "$GITHUB_RUN_ID" \
                    --bulk-cache "$BULK_CACHE_DIR" \
                    --verbose \
                    $FORCE

            # ── 9. Audit + validate ──────────────────────────────────────────────────
            - name: Audit payload (RT-QA-2026-REV5)
              run: python scripts/audit_payload.py --input logs/top_lists.json

            - name: Validate top_lists.json
              run: |
                  python3 - <<'EOF'
                  import json, sys
                  from pathlib import Path
                  p = Path("logs/top_lists.json")
                  if not p.exists():
                      print("::error::top_lists.json was not written — pipeline failed silently")
                      sys.exit(1)
                  d = json.loads(p.read_text())
                  if not d.get("top_buys"):
                      print("::error::top_lists.json exists but top_buys is empty")
                      sys.exit(1)
                  count = d.get("ticker_count", 0)
                  sample = d["top_buys"][0].get("factors", {})
                  required = {"analyst_consensus", "quality_piotroski"}
                  missing = required - set(sample.keys())
                  if missing:
                      print(f"::error::Missing 9-factor keys in top_buys[0].factors: {missing}")
                      sys.exit(1)
                  weights = d.get("weights", {})
                  if weights:
                      total = sum(weights.values())
                      if abs(total - 1.0) > 1e-6:
                          print(f"::error::WEIGHTS sum={total:.8f} != 1.0")
                          sys.exit(1)
                  print(f"Validated: {len(d['top_buys'])} top buys, {count} tickers scored, 9-factor schema OK")
                  EOF

            # ── 10. Satellite insights ───────────────────────────────────────────────
            - name: Generate satellite insights
              continue-on-error: true
              env:
                  FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
              run: |
                  python -m backend.market_intel.satellite_factors \
                    --log-dir logs \
                    --verbose

            # ── 11. Minsky stress + orthogonality ───────────────────────────────────
            - name: Check Minsky insider stress
              if: always()
              env:
                  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL || '' }}
              run: |
                  python -m monitoring.minsky_alert --log-dir logs
                  python - <<'EOF'
                  import sys, os
                  sys.path.insert(0, '.')
                  from pathlib import Path
                  from monitoring.minsky_alert import check_orthogonality_alert
                  check_orthogonality_alert(
                      Path('logs'),
                      webhook_url=os.environ.get('DISCORD_WEBHOOK_URL'),
                  )
                  EOF

            # ── 12. Run summary ──────────────────────────────────────────────────────
            - name: Generate run summary
              if: always()
              run: |
                  echo "## US Pipeline — $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  if [ -f logs/top_lists.json ]; then
                    echo "### Top 5 US Buys" >> "$GITHUB_STEP_SUMMARY"
                    echo "" >> "$GITHUB_STEP_SUMMARY"
                    echo '| # | Ticker | Score | IC | IB | Cong | NS | NB | Mom | Vol | AC | PIO |' >> "$GITHUB_STEP_SUMMARY"
                    echo '|---|---|---|---|---|---|---|---|---|---|---|---|' >> "$GITHUB_STEP_SUMMARY"
                    python3 - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
                  import json
                  try:
                      with open("logs/top_lists.json") as f:
                          d = json.load(f)
                      for i, t in enumerate(d.get('top_buys', [])[:5], 1):
                          fac = t.get('factors', {})
                          print(f"| {i} | **{t['ticker']}** | {t['final_score']:.4f} | "
                                f"{fac.get('insider_conviction', 0):.2f} | "
                                f"{fac.get('insider_breadth', 0):.2f} | "
                                f"{fac.get('congress', 0):.2f} | "
                                f"{fac.get('news_sentiment', 0):.2f} | "
                                f"{fac.get('news_buzz', 0):.2f} | "
                                f"{fac.get('momentum_long', 0):.2f} | "
                                f"{fac.get('volume_attention', 0):.2f} | "
                                f"{fac.get('analyst_consensus', 0):.2f} | "
                                f"{fac.get('quality_piotroski', 0):.2f} |")
                  except Exception as e:
                      print(f"| — | _summary unavailable: {e}_ | | | | | | | | | | |")
                  EOF
                  else
                    echo "⚠️ _top_lists.json was not generated during this run._" >> "$GITHUB_STEP_SUMMARY"
                  fi

            # ── 13. Upload artifacts ─────────────────────────────────────────────────
            - name: Upload us-top-lists artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: us-top-lists
                  retention-days: 7
                  if-no-files-found: warn
                  path: |
                      logs/top_lists.json
                      logs/top5.csv
                      logs/satellite_insights.json
                      logs/intel_source_status.json

            - name: Upload US debug artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: us-pipeline-debug-${{ github.run_id }}
                  retention-days: 14
                  if-no-files-found: warn
                  path: |
                      logs/metrics.json
                      logs/edgar_debug_summary.json
                      logs/form4_summary.csv
                      logs/marketintel_events.json
                      logs/intel_source_status.json
                      logs/kill_switch_audit.ndjson
                      logs/*.log
                      .monitoring/edgar_cb.json
                      .monitoring/alert_state.json
