name: weekly_backtest

# ─────────────────────────────────────────────────────────────────────────────
# Weekly signal performance audit.
#
# Every Friday 21:00 UTC (30 min after NYSE close), after the edgar_3x pipeline has produced the latest
# top_lists.json, this workflow:
#   1. Runs backtest_signals.py against logs/archive/ (all historical snapshots)
#   2. Uploads backtest_report_latest.json as a 90-day artifact
#   3. Appends the Markdown summary to the GitHub Step Summary
#
# Archive accumulation:
#   The edgar_3x workflow uploads top_lists.json as the "top-lists" artifact
#   (7-day retention). To build a persistent archive, set up a separate
#   "archive-toplists" workflow (or cron job) that downloads the artifact and
#   commits it to logs/archive/YYYY-MM-DD_top_lists.json before this runs.
#   Until the archive exists the backtest will report 0 signals gracefully.
#
# Manual trigger: workflow_dispatch supports --dry-run for CI validation
#   without hitting yfinance.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 21 * * 5"   # Friday 21:00 UTC (NYSE close ~30 min after market)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip price download (parse + metrics only)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      archive_dir:
        description: "Path to archive directory (relative to repo root)"
        required: false
        default: "logs/archive"

jobs:
  backtest:
    name: Weekly Signal Backtest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests

      - name: Create archive directory
        run: mkdir -p "${{ github.event.inputs.archive_dir || 'logs/archive' }}"

      - name: Run backtest
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY="--dry-run"
          fi
          python scripts/backtest_signals.py \
            --archive-dir "${{ github.event.inputs.archive_dir || 'logs/archive' }}" \
            --report-json logs/backtest_report_latest.json \
            --summary-md  logs/backtest_summary.md \
            --verbose \
            $DRY

      - name: Append summary to Step Summary
        if: always()
        run: |
          if [ -f logs/backtest_summary.md ]; then
            cat logs/backtest_summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload backtest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report-${{ github.run_id }}
          retention-days: 90
          if-no-files-found: warn
          path: |
            logs/backtest_report_latest.json
            logs/backtest_ledger_latest.csv
            logs/backtest_summary.md
