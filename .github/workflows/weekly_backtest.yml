name: weekly_backtest

# ─────────────────────────────────────────────────────────────────────────────
# Weekly signal performance audit — every Friday 21:00 UTC.
#
# FMP Ultimate changes:
#   - EOD price data sourced from FMP eod-bulk (already in .cache/bulk_snapshots
#     from edgar_3x same-day run) instead of yfinance — eliminates the yfinance
#     dependency for price data and uses the same data source as the scorer.
#   - yfinance kept as fallback for tickers FMP doesn't cover (rare edge case).
#   - Per-factor IC tracking added: reports IC for each of the 9 factors using
#     the archive of historical top_lists.json snapshots.
#   - Backtest now validates the 9-factor weight schema on archive entries.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 21 * * 5" # Friday 21:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip price download (parse + metrics only)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      archive_dir:
        description: "Path to archive directory"
        required: false
        default: "logs/archive"
      use_fmp_prices:
        description: "Use FMP eod-bulk for prices (else yfinance fallback)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

concurrency:
  group: weekly_backtest
  cancel-in-progress: false

jobs:
  backtest:
    name: Weekly Signal Backtest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Get cache date
        id: cache_date
        run: echo "date=$(date -u '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore pipeline data cache
        uses: actions/cache@v4
        with:
          path: .cache/
          key: pipeline-cache-${{ runner.os }}-${{ steps.cache_date.outputs.date }}
          restore-keys: |
            pipeline-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests yfinance   # yfinance as fallback only

      - name: Create archive directory
        run: mkdir -p "${{ github.event.inputs.archive_dir || 'logs/archive' }}"

      # ── FMP price data (Ultimate eod-bulk) ───────────────────────────────────
      # eod-bulk returns EOD OHLCV for all symbols in one call.
      # The edgar_3x 16:00 UTC run already cached this today — reuse it.
      # Falls back gracefully if cache is absent (first-ever run, manual dispatch).
      - name: Fetch FMP EOD prices for backtest
        if: github.event.inputs.use_fmp_prices != 'false'
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FMP_MAX_RPS: ${{ vars.FMP_MAX_RPS || '50' }}
          BULK_CACHE_DIR: ".cache/bulk_snapshots"
          BULK_CACHE_TTL_HOURS: "26" # accept today's cache (runs after edgar_3x 16:00)
        run: |
          set -euo pipefail
          python scripts/fmp_bulk_prefetch.py \
            --cache-dir "$BULK_CACHE_DIR" \
            --ttl-hours "$BULK_CACHE_TTL_HOURS" \
            --endpoints eod-bulk \
            --verbose || echo "::warning::FMP eod-bulk fetch failed — backtest_signals.py will fall back to yfinance"

      # ── Run backtest ──────────────────────────────────────────────────────────
      - name: Run backtest
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL || '' }}
          FMP_EOD_CACHE: ".cache/bulk_snapshots/eod-bulk.json"
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY="--dry-run"
          fi

          FMP_PRICES_FLAG=""
          if [ "${{ github.event.inputs.use_fmp_prices }}" != "false" ] && [ -f ".cache/bulk_snapshots/eod-bulk.json" ]; then
            FMP_PRICES_FLAG="--fmp-eod-cache .cache/bulk_snapshots/eod-bulk.json"
          fi

          python scripts/backtest_signals.py \
            --archive-dir "${{ github.event.inputs.archive_dir || 'logs/archive' }}" \
            --report-json logs/backtest_report_latest.json \
            --summary-md  logs/backtest_summary.md \
            --factors     insider_conviction insider_breadth congress \
                          news_sentiment news_buzz momentum_long \
                          volume_attention analyst_consensus quality_piotroski \
            $FMP_PRICES_FLAG \
            --verbose \
            $DRY

      - name: Append summary to Step Summary
        if: always()
        run: |
          if [ -f logs/backtest_summary.md ]; then
            cat logs/backtest_summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload backtest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report-${{ github.run_id }}
          retention-days: 90
          if-no-files-found: warn
          path: |
            logs/backtest_report_latest.json
            logs/backtest_ledger_latest.csv
            logs/backtest_summary.md
