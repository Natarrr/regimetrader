name: edgar_3x

# ─────────────────────────────────────────────────────────────────────────────
# EDGAR data pipeline — 3× daily at 00:00, 08:00, 16:00 UTC.
# Each run fetches full 160-ticker universe, generates top_lists.json,
# and uploads it as artifact "top-lists" for the daily Discord workflow.
#
# SEC rate-limit note: concurrency group "edgar_data_fetch" prevents two runs
# from hitting the SEC simultaneously. If a run is still in progress when the
# next schedule fires, the new run waits (cancel-in-progress: false).
#
# Relation to other workflows:
#   canary.yml        — 10-ticker health check 3×/day (separate group)
#   nightly_edgar.yml — deep backfill at 00:00 UTC (kept for compatibility)
#   market_intel.yml  — CI unit tests (push/PR triggered)
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 0 * * *"    # 00:00 UTC — post-Asia close
    - cron: "0 8 * * *"    # 08:00 UTC — London open
    - cron: "0 16 * * *"   # 16:00 UTC — NYC mid-session
  workflow_dispatch:
    inputs:
      tickers_file:
        description: "Tickers CSV (relative to repo root)"
        required: false
        default: "config/universe.csv"
      force_regen:
        description: "Force top_lists regeneration even if fresh"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  fetch-and-rank:
    runs-on: ubuntu-latest
    # 160 tickers via ThreadPoolExecutor — EDGAR + FMP + yfinance ≈ 40 min max
    timeout-minutes: 60

    concurrency:
      group: edgar_data_fetch
      cancel-in-progress: false

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python 3.11 + pip cache ───────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 2b. Restore congress/CIK cache across intraday runs ──────────────────
      # congress_cache.json has a 24h TTL in run_pipeline.py.  Without persisting
      # it, each CI run fetches Quiver fresh — intraday data changes cause
      # cross-sectional congress scores to reshuffle and rankings to flip.
      # Key resets daily so stale data never survives past midnight UTC.
      - name: Get cache date
        id: cache_date
        run: echo "date=$(date -u '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore pipeline data cache
        uses: actions/cache@v4
        with:
          path: .cache/
          key: pipeline-cache-${{ runner.os }}-${{ steps.cache_date.outputs.date }}
          restore-keys: |
            pipeline-cache-${{ runner.os }}-

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install CI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Install full pipeline deps
        run: pip install -r requirements.txt

      # ── 4. EDGAR fetch — 3-attempt retry with 30s/60s backoff ───────────────
      - name: EDGAR full-universe fetch
        id: edgar_fetch
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT || 'regime-trader-research n.tardy@hotmail.fr' }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY || '' }}
          FMP_MAX_RPS: ${{ vars.FMP_MAX_RPS || '1' }}
          EDGAR_FIRST: "true"
        run: |
          TICKERS_FILE="${{ github.event.inputs.tickers_file || 'config/universe.csv' }}"
          LOG_DIR="logs"
          mkdir -p "$LOG_DIR" .monitoring

          SUCCESS=false
          for ATTEMPT in 1 2 3; do
            echo "::group::EDGAR fetch — attempt $ATTEMPT / 3"
            START=$(date +%s)
            if timeout 55m python scripts/run_pipeline.py \
              --tickers-file "$TICKERS_FILE" \
              --max-workers  4 \
              --log-dir      "$LOG_DIR" \
              --verbose; then
              END=$(date +%s)
              echo "DURATION_SECONDS=$((END - START))" >> "$GITHUB_ENV"
              SUCCESS=true
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
            if [ "$ATTEMPT" -lt 3 ]; then
              WAIT=$((ATTEMPT * 30))
              echo "::warning::Attempt $ATTEMPT failed — retrying in ${WAIT}s"
              sleep "$WAIT"
            fi
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "::error::All 3 EDGAR fetch attempts failed"
            exit 1
          fi

      # ── 5. Export metrics ────────────────────────────────────────────────────
      - name: Export metrics
        if: always()
        run: |
          python -m monitoring.metrics_exporter \
            --log-dir logs \
            --duration-seconds "${DURATION_SECONDS:-0}"

      # ── 6. Generate top_lists.json ───────────────────────────────────────────
      #
      # Seven-factor scoring: insider_conviction(0.30) insider_breadth(0.15)
      # congress(0.22) news_sentiment(0.10) news_buzz(0.05) momentum_long(0.15)
      # volume_attention(0.03) — weights mirror run_pipeline.WEIGHTS.
      # Congress data from House/Senate Stock Watcher S3 (no API key needed).
      # Market cap tiers assigned by absolute thresholds (large ≥$10B, mid ≥$2B).
      - name: Generate top lists
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY || '' }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          FORCE=""
          if [ "${{ github.event.inputs.force_regen }}" = "true" ]; then
            FORCE="--force"
          fi
          python -m backend.market_intel.generate_top_lists \
            --log-dir logs \
            --run-id  "$GITHUB_RUN_ID" \
            --verbose \
            $FORCE

      # ── 6b. Institutional audit — circuit-breaker before Discord delivery ──────
      # Validates score range, badge/score consistency, sort order, geographic
      # leakage, cross-contamination (EU/Asia congress ≠ 0), VIX coherence,
      # and ticker format.  Exit 1 blocks the pipeline before Discord fires.
      - name: Audit payload (RT-QA-2026-REV4)
        run: python scripts/audit_payload.py --input logs/top_lists.json

      # ── 6c. Gate — validate top_lists.json before Discord fires ─────────────
      - name: Validate top_lists.json
        run: |
          python3 - <<'EOF'
          import json, sys
          from pathlib import Path
          p = Path("logs/top_lists.json")
          if not p.exists():
              print("::error::top_lists.json was not written — pipeline failed silently")
              sys.exit(1)
          d = json.loads(p.read_text())
          if not d.get("top_buys"):
              print("::error::top_lists.json exists but top_buys is empty")
              sys.exit(1)
          count = d.get("ticker_count", 0)
          print(f"Validated: {len(d['top_buys'])} top buys, {count} tickers scored")
          EOF

      # ── 7. Generate satellite insights ──────────────────────────────────────
      - name: Generate satellite insights
        continue-on-error: true
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY || '' }}
        run: |
          python -m backend.market_intel.satellite_factors \
            --log-dir logs \
            --verbose

      # ── 8. Check Minsky insider stress ──────────────────────────────────────
      - name: Check Minsky insider stress
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL || '' }}
        run: |
          python -m monitoring.minsky_alert --log-dir logs

      # ── 9. Generate run execution summary ────────────────────────────────────
      - name: Generate Run Execution Summary
        if: always()
        run: |
          echo "## EDGAR 3× Run — $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f logs/top_lists.json ]; then
            echo "### 📊 Pipeline Ranking Metrics (Top 5 Buys)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '| # | Ticker | Score | Badge | IC | IB | Cong | NS | NB | Mom | Vol |' >> "$GITHUB_STEP_SUMMARY"
            echo '|---|---|---|---|---|---|---|---|---|---|---|' >> "$GITHUB_STEP_SUMMARY"
            python3 - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import json
          try:
              with open("logs/top_lists.json") as f:
                  d = json.load(f)
              for i, t in enumerate(d.get('top_buys', [])[:5], 1):
                  fac = t.get('factors', {})
                  print(f"| {i} | **{t['ticker']}** | {t['final_score']:.4f} | {t['badge']} | "
                        f"{fac.get('insider_conviction', fac.get('edgar', 0)):.2f} | "
                        f"{fac.get('insider_breadth', fac.get('insider', 0)):.2f} | "
                        f"{fac.get('congress', 0):.2f} | "
                        f"{fac.get('news_sentiment', fac.get('news', 0)):.2f} | "
                        f"{fac.get('news_buzz', 0):.2f} | "
                        f"{fac.get('momentum_long', fac.get('momentum', 0)):.2f} | "
                        f"{fac.get('volume_attention', 0):.2f} |")
          except Exception as e:
              print(f"| — | _summary unavailable: {e}_ | | | | | | | | | |")
          EOF
          else
            echo "⚠️ _top_lists.json was not generated during this run._" >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── 10. Upload artifacts ──────────────────────────────────────────────────
      - name: Upload top-lists artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: top-lists
          retention-days: 7
          if-no-files-found: warn
          path: |
            logs/top_lists.json
            logs/top5.csv
            logs/satellite_insights.json
            logs/intel_source_status.json

      - name: Upload pipeline debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edgar-3x-debug-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            logs/metrics.json
            logs/edgar_debug_summary.json
            logs/form4_summary.csv
            logs/marketintel_events.json
            logs/intel_source_status.json
            logs/*.log
            .monitoring/edgar_cb.json
            .monitoring/alert_state.json

  archive-snapshot:
    name: Archive Daily Snapshot
    needs: fetch-and-rank
    runs-on: ubuntu-latest
    if: success()
    concurrency:
      group: archive-snapshot-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download top-lists artifact
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: edgar_3x.yml
          name: top-lists
          path: logs/
          run_id: ${{ github.run_id }}
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: Archive snapshot (first run of day only)
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          DEST="logs/archive/${TODAY}_top_lists.json"
          if [ ! -f logs/top_lists.json ]; then
            echo "top_lists.json not found — skipping archive"
            exit 0
          fi
          if git ls-files --error-unmatch "$DEST" 2>/dev/null; then
            echo "Archive already exists for $TODAY — skipping"
            exit 0
          fi
          mkdir -p logs/archive
          cp logs/top_lists.json "$DEST"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DEST"
          git commit -m "chore(archive): snapshot $TODAY"
          git push
