name: edgar_3x

# ─────────────────────────────────────────────────────────────────────────────
# EDGAR data pipeline — 3× daily at 00:00, 08:00, 16:00 UTC.
#
# FMP Ultimate tier: 3,000 calls/min (50 req/s).
# Confirmed-working bulk endpoints (stable/ NDJSON, 2026-06-03):
#   upgrades-downgrades-consensus-bulk → analyst_consensus score
#   ratios-ttm-bulk                    → Piotroski verification + quality factors
#   key-metrics-ttm-bulk               → fundamental context
#
# Per-ticker FMP (not available as bulk):
#   quality_piotroski  → FMPClient.get_quality_score() (ratios-ttm per-ticker)
#   PEAD boost         → FMPClient.get_earnings_surprise() per-ticker
#   price_target_upside → FMPClient.get_upside_to_target() per-ticker
#
# Relation to other workflows:
#   canary.yml              — 10-ticker health check 3×/day (separate group)
#   nightly_edgar.yml       — manual full-universe backfill only
#   market_intel.yml        — CI unit tests (push/PR triggered)
#   hybrid_pipeline.yml     — weekday Claude analysis at 12:30 UTC
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 0 * * *" # 00:00 UTC — post-Asia close
    - cron: "0 8 * * *" # 08:00 UTC — London open
    - cron: "0 16 * * *" # 16:00 UTC — NYC mid-session
  workflow_dispatch:
    inputs:
      tickers_file:
        description: "Tickers CSV (relative to repo root)"
        required: false
        default: "config/universe.csv"
      force_regen:
        description: "Force top_lists regeneration even if fresh"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  fetch-and-rank:
    runs-on: ubuntu-latest
    # EDGAR + FMP bulk + scoring — 20 min max (was 60 before bulk migration)
    timeout-minutes: 25

    concurrency:
      group: edgar_data_fetch
      cancel-in-progress: false

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python 3.11 + pip cache ───────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 2b. Restore daily pipeline cache ────────────────────────────────────
      # Persists congress_cache.json (24h TTL) and bulk snapshot cache across
      # the three intraday runs.  Bulk EOD/ratios snapshots are large but stable
      # within a trading day — caching avoids re-downloading 150 MB on each run.
      - name: Get cache date
        id: cache_date
        run: echo "date=$(date -u '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore pipeline data cache
        uses: actions/cache@v4
        with:
          path: .cache/
          key: pipeline-cache-${{ runner.os }}-${{ steps.cache_date.outputs.date }}
          restore-keys: |
            pipeline-cache-${{ runner.os }}-

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install CI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Install full pipeline deps
        run: pip install -r requirements.txt

      # ── 4. Bulk FMP pre-fetch (Ultimate tier: 50 req/s) ─────────────────────
      # Confirmed-working stable/ NDJSON endpoints (verified 2026-06-03).
      # Cache is shared across the three intraday runs via actions/cache.
      - name: FMP bulk pre-fetch (Ultimate)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FMP_MAX_RPS: ${{ vars.FMP_MAX_RPS || '50' }}
          BULK_CACHE_DIR: ".cache/bulk_snapshots"
          BULK_CACHE_TTL_HOURS: "23"
        run: |
          set -euo pipefail
          python scripts/fmp_bulk_prefetch.py \
            --cache-dir  "$BULK_CACHE_DIR" \
            --ttl-hours  "$BULK_CACHE_TTL_HOURS" \
            --endpoints  upgrades-downgrades-consensus-bulk \
                         ratios-ttm-bulk \
                         key-metrics-ttm-bulk \
            --verbose

      # ── 5. EDGAR fetch — 3-attempt retry ────────────────────────────────────
      # FMP is no longer the bottleneck; EDGAR SEC rate-limit (10 req/s) drives
      # total runtime.  FMP_MAX_RPS=50 saturates Ultimate without exceeding limit.
      - name: EDGAR full-universe fetch
        id: edgar_fetch
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FMP_MAX_RPS: ${{ vars.FMP_MAX_RPS || '50' }}
          EDGAR_FIRST: "true"
          BULK_CACHE_DIR: ".cache/bulk_snapshots"
        run: |
          TICKERS_FILE="${{ github.event.inputs.tickers_file || 'config/universe.csv' }}"
          LOG_DIR="logs"
          mkdir -p "$LOG_DIR" .monitoring

          SUCCESS=false
          for ATTEMPT in 1 2 3; do
            echo "::group::EDGAR fetch — attempt $ATTEMPT / 3"
            START=$(date +%s)
            if timeout 20m python scripts/run_pipeline.py \
              --tickers-file "$TICKERS_FILE" \
              --max-workers  8 \
              --log-dir      "$LOG_DIR" \
              --bulk-cache   "$BULK_CACHE_DIR" \
              --verbose; then
              END=$(date +%s)
              echo "DURATION_SECONDS=$((END - START))" >> "$GITHUB_ENV"
              SUCCESS=true
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
            if [ "$ATTEMPT" -lt 3 ]; then
              WAIT=$((ATTEMPT * 30))
              echo "::warning::Attempt $ATTEMPT failed — retrying in ${WAIT}s"
              sleep "$WAIT"
            fi
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "::error::All 3 EDGAR fetch attempts failed"
            exit 1
          fi

      # ── 6. Export metrics ────────────────────────────────────────────────────
      - name: Export metrics
        if: always()
        run: |
          python -m monitoring.metrics_exporter \
            --log-dir logs \
            --duration-seconds "${DURATION_SECONDS:-0}"

      # ── 7. Generate top_lists.json ───────────────────────────────────────────
      #
      # Nine-factor scoring (weights enforced: sum = 1.0):
      #   insider_conviction(0.25) insider_breadth(0.12) congress(0.12)
      #   news_sentiment(0.10) news_buzz(0.05) momentum_long(0.15)
      #   volume_attention(0.03) analyst_consensus(0.10) quality_piotroski(0.08)
      #
      # quality_piotroski applied as multiplicative gate:
      #   piotroskiScore < 3 → BUY score multiplied by 0.0 (suppressed)
      #   piotroskiScore 3-5 → multiplied by 0.6 (discounted)
      #   piotroskiScore 6+  → multiplied by 1.0 (full weight)
      #   EU/Asia: gate applies. congress: 0.0 for non-US tickers.
      - name: Generate top lists
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          BULK_CACHE_DIR: ".cache/bulk_snapshots"
        run: |
          FORCE=""
          if [ "${{ github.event.inputs.force_regen }}" = "true" ]; then
            FORCE="--force"
          fi
          python -m backend.market_intel.generate_top_lists \
            --log-dir    logs \
            --run-id     "$GITHUB_RUN_ID" \
            --bulk-cache "$BULK_CACHE_DIR" \
            --verbose \
            $FORCE

      # ── 7b. Institutional audit ──────────────────────────────────────────────
      - name: Audit payload (RT-QA-2026-REV5)
        run: python scripts/audit_payload.py --input logs/top_lists.json

      # ── 7c. Validate top_lists.json ──────────────────────────────────────────
      - name: Validate top_lists.json
        run: |
          python3 - <<'EOF'
          import json, sys
          from pathlib import Path
          p = Path("logs/top_lists.json")
          if not p.exists():
              print("::error::top_lists.json was not written — pipeline failed silently")
              sys.exit(1)
          d = json.loads(p.read_text())
          if not d.get("top_buys"):
              print("::error::top_lists.json exists but top_buys is empty")
              sys.exit(1)
          count = d.get("ticker_count", 0)
          # Verify 9-factor schema is present
          sample = d["top_buys"][0].get("factors", {})
          required = {"analyst_consensus", "quality_piotroski"}
          missing = required - set(sample.keys())
          if missing:
              print(f"::error::Missing 9-factor keys in top_buys[0].factors: {missing}")
              sys.exit(1)
          # Weight sum assertion
          weights = d.get("weights", {})
          if weights:
              total = sum(weights.values())
              if abs(total - 1.0) > 1e-6:
                  print(f"::error::WEIGHTS sum={total:.8f} != 1.0")
                  sys.exit(1)
          print(f"Validated: {len(d['top_buys'])} top buys, {count} tickers scored, 9-factor schema OK")
          EOF

      # ── 8. Generate satellite insights ──────────────────────────────────────
      - name: Generate satellite insights
        continue-on-error: true
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python -m backend.market_intel.satellite_factors \
            --log-dir logs \
            --verbose

      # ── 9. Check Minsky insider stress ──────────────────────────────────────
      - name: Check Minsky insider stress
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL || '' }}
        run: |
          python -m monitoring.minsky_alert --log-dir logs

      # ── 10. Run execution summary ────────────────────────────────────────────
      - name: Generate Run Execution Summary
        if: always()
        run: |
          echo "## EDGAR 3× Run — $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f logs/top_lists.json ]; then
            echo "### Pipeline Ranking Metrics (Top 5 Buys)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '| # | Ticker | Score | IC | IB | Cong | NS | NB | Mom | Vol | AC | PIO |' >> "$GITHUB_STEP_SUMMARY"
            echo '|---|---|---|---|---|---|---|---|---|---|---|---|' >> "$GITHUB_STEP_SUMMARY"
            python3 - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import json
          try:
              with open("logs/top_lists.json") as f:
                  d = json.load(f)
              for i, t in enumerate(d.get('top_buys', [])[:5], 1):
                  fac = t.get('factors', {})
                  print(f"| {i} | **{t['ticker']}** | {t['final_score']:.4f} | "
                        f"{fac.get('insider_conviction', 0):.2f} | "
                        f"{fac.get('insider_breadth', 0):.2f} | "
                        f"{fac.get('congress', 0):.2f} | "
                        f"{fac.get('news_sentiment', 0):.2f} | "
                        f"{fac.get('news_buzz', 0):.2f} | "
                        f"{fac.get('momentum_long', 0):.2f} | "
                        f"{fac.get('volume_attention', 0):.2f} | "
                        f"{fac.get('analyst_consensus', 0):.2f} | "
                        f"{fac.get('quality_piotroski', 0):.2f} |")
          except Exception as e:
              print(f"| — | _summary unavailable: {e}_ | | | | | | | | | | |")
          EOF
          else
            echo "⚠️ _top_lists.json was not generated during this run._" >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── 11. Upload artifacts ─────────────────────────────────────────────────
      - name: Upload top-lists artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: top-lists
          retention-days: 7
          if-no-files-found: warn
          path: |
            logs/top_lists.json
            logs/top5.csv
            logs/satellite_insights.json
            logs/intel_source_status.json

      - name: Upload pipeline debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edgar-3x-debug-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            logs/metrics.json
            logs/edgar_debug_summary.json
            logs/form4_summary.csv
            logs/marketintel_events.json
            logs/intel_source_status.json
            logs/*.log
            .monitoring/edgar_cb.json
            .monitoring/alert_state.json

  archive-snapshot:
    name: Archive Daily Snapshot
    needs: fetch-and-rank
    runs-on: ubuntu-latest
    if: success()
    concurrency:
      group: archive-snapshot-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download top-lists artifact
        uses: dawidd6/action-download-artifact@v8
        with:
          workflow: edgar_3x.yml
          name: top-lists
          path: logs/
          run_id: ${{ github.run_id }}
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: Archive snapshot (first run of day only)
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          DEST="logs/archive/${TODAY}_top_lists.json"
          if [ ! -f logs/top_lists.json ]; then
            echo "top_lists.json not found — skipping archive"
            exit 0
          fi
          if git ls-files --error-unmatch "$DEST" 2>/dev/null; then
            echo "Archive already exists for $TODAY — skipping"
            exit 0
          fi
          mkdir -p logs/archive
          cp logs/top_lists.json "$DEST"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DEST"
          git commit -m "chore(archive): snapshot $TODAY"
          git push
